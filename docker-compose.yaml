version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: order_mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: order_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order_network
  log-mysql:                                  # ← NEW SERVICE
    image: mysql:8.0
    container_name: log_mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: log_db                  # ← Different DB name
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
    - "3307:3306"                           # ← WHY 3307? Host port must be unique! 3306 already taken by order_mysql
    volumes:
    - log_mysql_data:/var/lib/mysql          # ← WHY separate volume? Same reason: isolation. Don't share disk space.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - order_network

  user-mysql: # ← NEW SERVICE
    image: mysql:8.0
    container_name: user_mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: user_db                  # ← Different DB name
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3308:3306"                           # ← WHY 3307? Host port must be unique! 3306 already taken by order_mysql
    volumes:
      - user_mysql_data:/var/lib/mysql          # ← WHY separate volume? Same reason: isolation. Don't share disk space.
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order_network

  zookeeper:
   image: confluentinc/cp-zookeeper:7.7.0
   container_name: zookeeper
   environment:
    ZOOKEEPER_CLIENT_PORT: 2181
   ports:
    - "2181:2181"
   networks:
    - order_network

  kafka:
   image: confluentinc/cp-kafka:7.7.0
   container_name: kafka
   depends_on:
    - zookeeper
   ports:
    - "9092:9092"
   environment:
    KAFKA_BROKER_ID: 1
    KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
   networks:
    - order_network


volumes:
  mysql_data:
  log_mysql_data:
  user_mysql_data:

networks:
  order_network:
    driver: bridge
