spring.application.name=notify


server.port=8999

# MySQL Connection (separate database)
spring.datasource.url=jdbc:mysql://localhost:3307/log_db
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notify-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# order sends its own OrderCreatedEvent(com.example.kaf.order.events.OrderCreatedEvent) to kafka.
# notify use its own OrderCreatedEvent(com.example.kaf.notify.model.OrderCreatedEvent). Below config fix the issues

spring.kafka.consumer.properties.spring.json.value.default.type=com.example.kaf.notify.model.OrderCreatedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false


# Eureka Discovery Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=notify
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

